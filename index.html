<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Kehadiran Asatidz - Madrasah Al-Qur'an BANI AITAM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
      color: #1a1a1a;
    }

    .container {
      width: 100%;
      max-width: 460px;
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .header {
      background: linear-gradient(180deg, #1b6b2b 0%, #15571f 100%);
      color: #ffffff;
      padding: 28px 24px 24px;
      text-align: center;
    }

    .logo {
      width: 84px;
      height: 84px;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo img { width: 100%; height: 100%; object-fit: contain; }
    .logo svg { width: 100%; height: 100%; }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .header .subtitle {
      font-size: 14px;
      opacity: 0.95;
      margin-bottom: 10px;
    }

    .header .date {
      font-size: 13px;
      opacity: 0.9;
    }

    .form {
      padding: 24px 20px 20px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1f2937;
    }

    .field select,
    .field input[type="date"],
    .field textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: #ffffff;
      color: #1f2937;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field select:focus,
    .field input[type="date"]:focus,
    .field textarea:focus {
      outline: none;
      border-color: #1b6b2b;
      box-shadow: 0 0 0 3px rgba(27, 107, 43, 0.12);
    }

    .field textarea {
      resize: vertical;
      min-height: 90px;
      font-family: inherit;
    }

    .kategori-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .kategori-card {
      position: relative;
      cursor: pointer;
    }

    .kategori-card input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .kategori-card .card-content {
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      padding: 14px 8px;
      text-align: center;
      transition: all 0.15s;
      background: #ffffff;
    }

    .kategori-card .arabic {
      font-family: 'Amiri', serif;
      font-size: 22px;
      color: #1b6b2b;
      display: block;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .kategori-card .label-id {
      font-size: 13px;
      color: #374151;
      font-weight: 500;
    }

    .kategori-card input:checked + .card-content {
      border-color: #1b6b2b;
      background: #f0f7f1;
      box-shadow: 0 0 0 2px rgba(27, 107, 43, 0.15);
    }

    .kategori-card:hover .card-content {
      border-color: #9ca3af;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #1b6b2b;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }

    .submit-btn:hover { background: #15571f; }
    .submit-btn:active { background: #114918; }
    .submit-btn:disabled { background: #9ca3af; cursor: not-allowed; }

    .footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: #6b7280;
      border-top: 1px solid #f0f0f0;
    }

    .message {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .message.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
      display: block;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <img src="logo.png" alt="Logo Pesantren Al Qur'an BANI AITAM"
             onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';">
        <svg id="logoFallback" style="display:none;" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" fill="#1b6b2b"/>
          <circle cx="32" cy="32" r="22" fill="#fcd34d"/>
          <circle cx="32" cy="32" r="16" fill="#1b6b2b"/>
          <path d="M32 22 L33 26 L37 26 L34 28 L35 32 L32 30 L29 32 L30 28 L27 26 L31 26 Z" fill="#fcd34d"/>
          <rect x="26" y="38" width="12" height="6" rx="1" fill="#ffffff"/>
        </svg>
      </div>
      <h1>Aplikasi Kehadiran Asatidz</h1>
      <div class="subtitle">Madrasah Al-Qur'an BANI AITAM</div>
      <div class="date" id="currentDate"></div>
    </div>

    <form class="form" id="attendanceForm">
      <div class="message" id="message"></div>

      <div class="field">
        <label for="asatidz">Asatidz</label>
        <select id="asatidz" name="asatidz" required>
          <option value="">Pilih nama Anda</option>
          <option value="Ustad Abdullah">Ustad Abdullah</option>
          <option value="Ustad Gufron">Ustad Gufron</option>
          <option value="Ustad Slamet">Ustad Slamet</option>
          <option value="Ustad Zuhal">Ustad Zuhal</option>
          <option value="Ustadzah Anita">Ustadzah Anita</option>
          <option value="Ustadzah Nunung">Ustadzah Nunung</option>
        </select>
      </div>

      <div class="field">
        <label for="tanggal">Tanggal</label>
        <input type="date" id="tanggal" name="tanggal" required>
      </div>

      <div class="field">
        <label>Kategori Kehadiran</label>
        <div class="kategori-options">
          <label class="kategori-card">
            <input type="radio" name="kategori" value="Paruh Waktu" required>
            <div class="card-content">
              <span class="arabic">حضور جزئي</span>
              <span class="label-id">Paruh Waktu</span>
            </div>
          </label>
          <label class="kategori-card">
            <input type="radio" name="kategori" value="Penuh Waktu" required>
            <div class="card-content">
              <span class="arabic">حضور كامل</span>
              <span class="label-id">Penuh Waktu</span>
            </div>
          </label>
        </div>
      </div>

      <div class="field">
        <label for="catatan">Catatan</label>
        <textarea id="catatan" name="catatan" placeholder="Tambahkan catatan tambahan di sini..."></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Kirim Presensi</button>
    </form>

    <div class="footer">
      Hak Cipta &copy; Madrasah Al-Qur'an BANI AITAM
    </div>
  </div>

  <script>
    // URL Google Apps Script Web App
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbylscW-8ZMpwZEDix4OOnyBGrXZH4NOJmjpDuDGEfTTzuKLqzawT4JEUG_3ARpm4QZF/exec';

    // Set tanggal hari ini di header
    const today = new Date();
    const dayNames = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
    const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
                        'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    document.getElementById('currentDate').textContent =
      `${dayNames[today.getDay()]}, ${today.getDate()} ${monthNames[today.getMonth()]} ${today.getFullYear()}`;

    // Set nilai default input tanggal ke hari ini
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    document.getElementById('tanggal').value = `${yyyy}-${mm}-${dd}`;

    // Tangani submit form
    const form = document.getElementById('attendanceForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageEl = document.getElementById('message');

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = 'message ' + type;
      if (type === 'success') {
        setTimeout(() => { messageEl.className = 'message'; }, 5000);
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = 'Mengirim...';

      const formData = {
        timestamp: new Date().toISOString(),
        asatidz: form.asatidz.value,
        tanggal: form.tanggal.value,
        kategori: form.kategori.value,
        catatan: form.catatan.value || '-'
      };

      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(formData)
        });

        showMessage('✓ Presensi berhasil dikirim. Terima kasih!', 'success');
        form.reset();
        document.getElementById('tanggal').value = `${yyyy}-${mm}-${dd}`;
      } catch (err) {
        showMessage('❌ Gagal mengirim presensi. Coba lagi atau hubungi admin.', 'error');
        console.error(err);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Kirim Presensi';
      }
    });
  </script>
</body>
</html>
